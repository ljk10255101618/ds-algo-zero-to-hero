<body>
    <div class="algo-header">
        <nav class="navbar">
            <a href="../../index.html" class="back-link">← 返回首页</a>
            <span class="nav-title">二叉搜索树</span>
        </nav>
        <div class="algo-header-content">
            <span class="algo-tag" style="background:#e67e22">树形结构</span>
            <span class="algo-level">Lv2</span>
            <h1>二叉搜索树 BST</h1>
            <p class="algo-desc"></p>
        </div>
    </div>

    <div class="algo-layout">
        <main class="algo-main">
            <section class="algo-section">
                
                <h2>📝 定义</h2>
                <p>二叉搜索树 (BST) 是一种特殊的二叉树：<strong>左子树所有节点 < 根节点 < 右子树所有节点</strong>。</p>
                <div class="highlight-box">
                    <strong>性质：</strong>中序遍历BST得到的是 <strong>升序序列</strong>。<br>
                    <strong>平均:</strong> 搜索/插入/删除 O(log n) &nbsp;|&nbsp; <strong>最差:</strong> O(n)（退化为链表）
                </div>
                <div class="complexity-box">
                    <div><span class="big-o">搜索</span> O(log n)</div>
                    <div><span class="big-o">插入</span> O(log n)</div>
                    <div><span class="big-o">删除</span> O(log n)</div>
                    <div><span class="big-o">空间</span> O(n)</div>
                </div>
            
            </section>
            <section class="algo-section">
                
                <h2>🎮 交互演示</h2>
                <div class="visualizer-container">
                    <div class="controls">
                        <label>值: <input type="number" id="bstVal" value="15" min="0" max="99"></label>
                        <button class="btn btn-primary" onclick="bstInsert()">插入</button>
                        <button class="btn btn-warning" onclick="bstSearch()">搜索</button>
                        <button class="btn btn-danger" onclick="bstDelete()">删除</button>
                        <button class="btn btn-secondary" onclick="resetBST()">重置</button>
                    </div>
                    <div id="bstViz" class="viz-canvas"></div>
                    <div id="bstLog" class="viz-log"></div>
                </div>
            
            </section>
            <section class="algo-section">
                
                <h2>💡 变体</h2>
                <div class="use-cases">
                    <div class="use-case-card"><h4>⚖️ AVL 树</h4><p>严格平衡，左右子树高度差 ≤ 1</p></div>
                    <div class="use-case-card"><h4>🔴 红黑树</h4><p>近似平衡，C++ STL map/set 的底层</p></div>
                    <div class="use-case-card"><h4>📊 Treap</h4><p>树堆，BST + 随机优先级维护平衡</p></div>
                </div>
            
            </section>
        </main>
        <aside class="algo-sidebar">
            <aside class="algo-sidebar">
            <div class="sidebar-card"><h3>⚡ 代码</h3><div class="code-block"><pre><code>class BST:
    def search(self, root, val):
        if not root or root.val == val:
            return root
        if val < root.val:
            return self.search(root.left, val)
        return self.search(root.right, val)

    def insert(self, root, val):
        if not root:
            return TreeNode(val)
        if val < root.val:
            root.left = self.insert(root.left, val)
        else:
            root.right = self.insert(root.right, val)
        return root</code></pre></div></div>
            <div class="sidebar-card"><h3>📌 题目</h3><ul>
                <li><a href="https://leetcode.cn/problems/validate-binary-search-tree/" target="_blank">98. 验证BST</a></li>
                <li><a href="https://leetcode.cn/problems/kth-smallest-element-in-a-bst/" target="_blank">230. BST第K小</a></li>
            </ul></div>
        </aside>
        </aside>
    </div>

        <script>
        
        let bstData = [10, 5, 15, 3, 7, 12, 18];
        const logEl = document.getElementById('bstLog');
        function logMsg(m){logEl.innerHTML=`<span class="log-msg">👉 ${m}</span>`;setTimeout(()=>logEl.innerHTML='',2500);}

        class TreeNode {
            constructor(val) { this.val = val; this.left = null; this.right = null; }
        }
        function buildBST(arr) {
            if (!arr.length) return null;
            const root = new TreeNode(arr[0]);
            for (let i = 1; i < arr.length; i++) {
                let cur = root;
                while (true) {
                    if (arr[i] < cur.val) {
                        if (!cur.left) { cur.left = new TreeNode(arr[i]); break; }
                        cur = cur.left;
                    } else {
                        if (!cur.right) { cur.right = new TreeNode(arr[i]); break; }
                        cur = cur.right;
                    }
                }
            }
            return root;
        }

        function getTreeData(root) {
            if (!root) return null;
            const d = {val: root.val, left: null, right: null};
            if (root.left) d.left = getTreeData(root.left);
            if (root.right) d.right = getTreeData(root.right);
            return d;
        }

        function render() {
            const root = buildBST(bstData);
            const w = 700, h = 350;
            const viz = document.getElementById('bstViz');
            viz.innerHTML = `<svg width="${w}" height="${h}"></svg>`;
            const svg = d3.select(viz.querySelector('svg'));
            if (!root || bstData.length === 0) {
                svg.append('text').attr('x',w/2).attr('y',h/2).attr('text-anchor','middle')
                 .attr('fill','#888').attr('font-size','20').text('∅ 空树');
                return;
            }
            const treeData = getTreeData(root);
            const hierarchy = d3.hierarchy(treeData);
            const treeLayout = d3.tree().size([w-100, h-80]);
            treeLayout(hierarchy);

            svg.selectAll('line').data(hierarchy.links()).enter().append('line')
             .attr('x1',d=>d.source.x+50).attr('y1',d=>d.source.y+40)
             .attr('x2',d=>d.target.x+50).attr('y2',d=>d.target.y+40)
             .attr('stroke','#4A90D9').attr('stroke-width',2);

            const nodes = svg.selectAll('g').data(hierarchy.descendants()).enter().append('g')
             .attr('transform',d=>`translate(${d.x+50},${d.y+40})`);

            nodes.append('circle').attr('r',22).attr('fill','#1e2a4a').attr('stroke','#e67e22').attr('stroke-width',2);
            nodes.append('text').attr('text-anchor','middle').attr('dy','5')
             .attr('fill','#fff').attr('font-size','14').attr('font-weight','bold').text(d=>d.data.val);
        }

        function bstInsert() {
            const v = +document.getElementById('bstVal').value;
            if (bstData.includes(v)) return logMsg(`⚠️ ${v} 已存在`);
            bstData.push(v);
            render(); logMsg(`✅ 插入 ${v} 成功`);
        }
        function bstSearch() {
            const v = +document.getElementById('bstVal').value;
            const found = bstData.includes(v);
            render(); logMsg(found ? `🔍 找到 ${v}（${bstData.indexOf(v)+1} 个节点之一）` : `❌ ${v} 不存在`);
        }
        function bstDelete() {
            const v = +document.getElementById('bstVal').value;
            const idx = bstData.indexOf(v);
            if (idx === -1) return logMsg(`❌ ${v} 不存在`);
            bstData.splice(idx, 1);
            // Rebuild to maintain BST property
            render(); logMsg(`🗑️ 已删除 ${v}`);
        }
        function resetBST() { bstData = [10, 5, 15, 3, 7, 12, 18]; render(); logMsg('已重置'); }
        render();
    
    </script>

</body>
