                <h2>什么是红黑树？</h2>
                <div class="intro-content">
                    <p>红黑树是一种 <span class="highlight">自平衡的二叉搜索树</span>，是计算机科学中最重要的数据结构之一。它保证了在最坏情况下基本操作的时间复杂度为 O(log n)。</p>
                    <p>红黑树的 <strong>5条性质</strong>：</p>
                    <ol class="rule-list">
                        <li>每个节点是 <span style="color:#e74c3c">红色</span> 或 <span style="color:#333">黑色</span></li>
                        <li>根节点是黑色的</li>
                        <li>叶子节点（NIL）是黑色的</li>
                        <li>红色节点的子节点必须是黑色的（<strong>不能有连续的红节点</strong>）</li>
                        <li>从任一节点到其每个叶子的路径上，<strong>黑色节点数量相同</strong></li>
                    </ol>
                    <p>💡 <strong>实际应用</strong>：Java 的 TreeMap/TreeSet、C++ STL 的 map/set、Linux 内核的完全公平调度器都基于红黑树。</p>

        <script>
        
const svg=d3.select("#rb-viz svg"),W=750,H=380;
let tree={root:null}; const r=22;
class Node{constructor(v){this.val=v;this.left=null;this.right=null;this.color='red';this.parent=null;}}
function isRed(n){return n&&n.color==='red';}
function rotateR(p){let q=p.left;p.left=q.right;if(q.right)q.right.parent=p;q.right=p;q.parent=p.parent;p.parent=q;return q;}
function rotateL(p){let q=p.right;p.right=q.left;if(q.left)q.left.parent=p;q.left=p;q.parent=p.parent;p.parent=q;return q;}
function flipColors(n){n.color='red';if(n.left)n.left.color='black';if(n.right)n.right.color='black';}
let msg=document.getElementById("rb-msg");
function insert(val){
    msg.textContent=`插入 ${val}`;
    if(!tree.root){tree.root=new Node(val);tree.root.color='black';msg.textContent=`插入 ${val} ✅ 根节点为黑色`;render();return;}
    let path=[],cur=tree.root,parent=null;
    while(cur){parent=cur;path.push(cur);if(val<cur.val)cur=cur.left;else if(val>cur.val)cur=cur.right;else{msg.textContent=`${val} 已存在`;render();return;}}
    let nn=new Node(val);nn.parent=parent;
    if(val<parent.val)parent.left=nn;else parent.right=nn;
    // Fix up
    fixInsert(nn,path);
    render();
}
function fixInsert(n,path){
    while(n!==tree.root&&isRed(n.parent)){
        let p=n.parent,g=p.parent;
        if(p===g.left){
            let u=g.right;
            if(isRed(u)){flipColors(g);n=g;msg.textContent='🔄 颜色翻转';}
            else{
                if(n===p.right){n=p;rotateL(n);p=n.parent;msg.textContent='🔄 LR→左旋';}
                p.color='black';g.color='red';rotateR(g);msg.textContent='🔄 右旋+变色';break;
            }
        }else{
            let u=g.left;
            if(isRed(u)){flipColors(g);n=g;msg.textContent='🔄 颜色翻转';}
            else{
                if(n===p.left){n=p;rotateR(n);p=n.parent;msg.textContent='🔄 RL→右旋';}
                p.color='black';g.color='red';rotateL(g);msg.textContent='🔄 左旋+变色';break;
            }
        }
    }
    tree.root.color='black';
}
function deleteTree(n){if(!n)return;deleteTree(n.left);deleteTree(n.right);}
function reset(){deleteTree(tree.root);tree.root=null;msg.textContent='已重置';render();}
function render(){
    svg.selectAll("*").remove();
    if(!tree.root){svg.append("text").attr("x",W/2).attr("y",H/2).attr("text-anchor","middle").attr("fill","#999").attr("font-size","16").text("红黑树为空，请插入节点");return;}
    const nodes=[],edges=[];const yGap=60;
    function trav(n,depth,l,r,x){if(!n)return;
        const cx=(l+r)/2;nodes.push({val:n.val,color:n.color,x:cx,y:depth*yGap+40,parentX:x});
        if(n.left){trav(n.left,depth+1,l,cx,(l+cx)/2);edges.push({x1:cx,y1:depth*yGap+40,x2:(l+cx)/2,y2:(depth+1)*yGap+40});}
        if(n.right){trav(n.right,depth+1,cx,r,(cx+r)/2);edges.push({x1:cx,y1:depth*yGap+40,x2:(cx+r)/2,y2:(depth+1)*yGap+40});}
    }
    trav(tree.root,0,0,W,W/2);
    edges.forEach(e=>{svg.append("line").attr("x1",e.x1).attr("y1",e.y1).attr("x2",e.x2).attr("y2",e.y2).attr("stroke","#999").attr("stroke-width",2);});
    nodes.forEach(n=>{const g=svg.append("g").attr("transform",`translate(${n.x},${n.y})`);
        g.append("circle").attr("r",r).attr("fill",n.color==='red'?'#e74c3c':'#333').attr("stroke","#fff").attr("stroke-width",2);
        g.append("text").attr("text-anchor","middle").attr("dy","0.35em").attr("fill",n.color==='red'?'#fff':'#fff').attr("font-size","14").attr("font-weight","bold").text(n.val);
    });
}
document.getElementById("insert-btn").addEventListener("click",()=>{const v=parseInt(document.getElementById("insert-input").value);if(!isNaN(v))insert(v);});
document.getElementById("auto-btn").addEventListener("click",()=>{reset();[7,3,18,10,22,8,11,26,2,6,13].forEach(v=>insert(v));});
document.getElementById("reset-btn").addEventListener("click",reset);
document.querySelectorAll(".tab-btn").forEach(b=>b.addEventListener("click",function(){
    document.querySelectorAll(".tab-btn").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
    this.classList.add("active");document.querySelector(`.tab-content[data-lang="${this.dataset.lang}"]`).classList.add("active");
}));

    </script>
