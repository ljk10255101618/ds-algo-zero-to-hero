    <div class="algo-layout">
        <main class="algo-main">
            <section class="algo-section">
                
                <h2>📝 定义</h2>
                <p>哈希表通过 <strong>哈希函数</strong> 将键 (Key) 映射到数组索引，实现近乎 O(1) 的查找。</p>
                <div class="highlight-box">
                    <strong>核心要素：</strong>
                    <ul>
                        <li><strong>哈希函数</strong> — key → index 的映射</li>
                        <li><strong>哈希冲突</strong> — 不同 key 映射到同一位置</li>
                        <li><strong>解决冲突</strong> — 链地址法 / 开放寻址法</li>
                        <li><strong>负载因子</strong> — 元素数/容量，超过阈值触发 rehash</li>
                    </ul>
                </div>
                <div class="complexity-box">
                    <div><span class="big-o">查找</span> O(1)*</div>
                    <div><span class="big-o">插入</span> O(1)*</div>
                    <div><span class="big-o">删除</span> O(1)*</div>
                    <div><span class="big-o">*平均</span> 最差 O(n)</div>
                </div>
            
            </section>
            <section class="algo-section">
                
                <h2>🎮 交互演示</h2>
                <div class="visualizer-container">
                    <div class="controls">
                        <label>Key: <input type="text" id="hKey" value="name" size="8"></label>
                        <label>Value: <input type="text" id="hVal" value="Alice" size="8"></label>
                        <button class="btn btn-primary" onclick="hPut()">Put</button>
                        <button class="btn btn-warning" onclick="hGet()">Get</button>
                        <button class="btn btn-danger" onclick="hDel()">Delete</button>
                        <button class="btn btn-secondary" onclick="hClear()">清空</button>
                    </div>
                    <div id="hashViz" class="viz-canvas"></div>
                    <div id="hashLog" class="viz-log"></div>
                </div>
            
            </section>
            <section class="algo-section">
                
                <h2>💡 应用</h2>
                <div class="use-cases">
                    <div class="use-case-card"><h4>📖 字典</h4><p>编程语言的 dict / map 实现</p></div>
                    <div class="use-case-card"><h4>🔑 缓存</h4><p>Redis 等内存缓存的核心结构</p></div>
                    <div class="use-case-card"><h4>🔗 索引</h4><p>数据库中的哈希索引</p></div>

        </main>
        <aside class="algo-sidebar">
            <aside class="algo-sidebar">
            <div class="sidebar-card"><h3>⚡ Python 实现</h3><div class="code-block"><pre><code>class HashTable:
    def __init__(self, cap=10):
        self.cap = cap
        self.table = [[] for _ in range(cap)]
        self.size = 0

    def _hash(self, key):
        return hash(key) % self.cap

    def put(self, key, val):
        idx = self._hash(key)
        for i, (k,_) in enumerate(self.table[idx]):
            if k == key:
                self.table[idx][i] = (key, val)
                return
        self.table[idx].append((key,val))
        self.size += 1

    def get(self, key):
        idx = self._hash(key)
        for k,v in self.table[idx]:
            if k == key: return v
        return None</code></pre></div></div>
            <div class="sidebar-card"><h3>📌 题目</h3><ul>
                <li><a href="https://leetcode.cn/problems/two-sum/" target="_blank">1. 两数之和</a></li>
                <li><a href="https://leetcode.cn/problems/lru-cache/" target="_blank">146. LRU缓存</a></li>
            </ul></div>
        </aside>
        </aside>
    </div>

        <script>
        
        const BUCKETS = 7;
        let hashTable = Array.from({length: BUCKETS}, () => []);
        const logEl = document.getElementById('hashLog');
        function logMsg(m){logEl.innerHTML=`<span class="log-msg">👉 ${m}</span>`;setTimeout(()=>logEl.innerHTML='',2500);}

        function hashFn(key) {
            let h = 0;
            for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) & 0x7fffffff;
            return h % BUCKETS;
        }

        function render() {
            const w = 750, h = 380;
            const viz = document.getElementById('hashViz');
            viz.innerHTML = `<svg width="${w}" height="${h}"></svg>`;
            const svg = d3.select(viz.querySelector('svg'));

            const bucketW = 100, startX = 30, startY = 30, rowH = 60;
            const totalItems = hashTable.reduce((s,b)=>s+b.length, 0);
            
            // Draw buckets
            hashTable.forEach((bucket, bi) => {
                const bx = startX + bi * (bucketW + 5);
                // Bucket index
                svg.append('text').attr('x',bx+5).attr('y',startY-8)
                 .attr('fill','#666').attr('font-size','11').text(`[${bi}]`);

                if (bucket.length === 0) {
                    svg.append('rect').attr('x',bx).attr('y',startY)
                     .attr('width',bucketW).attr('height',32).attr('rx',4)
                     .attr('fill','#0d1b2a').attr('stroke','#333').attr('stroke-width',1);
                    svg.append('text').attr('x',bx+bucketW/2).attr('y',startY+21)
                     .attr('text-anchor','middle').attr('fill','#444').attr('font-size','12').text('∅');
                    return;
                }

                bucket.forEach(([k,v], idx) => {
                    const by = startY + idx * 36;
                    svg.append('rect').attr('x',bx).attr('y',by)
                     .attr('width',bucketW).attr('height',32).attr('rx',4)
                     .attr('fill','#1a2a4a').attr('stroke','#9b59b6').attr('stroke-width',1.5);
                    svg.append('text').attr('x',bx+8).attr('y',by+21)
                     .attr('fill','#FFD700').attr('font-size','11').attr('font-weight','bold').text(k);
                    svg.append('text').attr('x',bx+bucketW-8).attr('y',by+21)
                     .attr('text-anchor','end').attr('fill','#7ecf9e').attr('font-size','11').text(`→ ${v}`);
                });
            });

            // Stats
            const loadFactor = totalItems / BUCKETS;
            svg.append('text').attr('x',30).attr('y',h-10).attr('fill','#888').attr('font-size','12')
             .text(`📊 元素数: ${totalItems}  |  桶数: ${BUCKETS}  |  负载因子: ${loadFactor.toFixed(2)}`);
        }

        function hPut() {
            const k = document.getElementById('hKey').value.trim();
            const v = document.getElementById('hVal').value.trim();
            if (!k) return logMsg('⚠️ 请输入 Key');
            const bi = hashFn(k);
            const bucket = hashTable[bi];
            const found = bucket.findIndex(([key]) => key === k);
            if (found !== -1) bucket[found] = [k, v];
            else bucket.push([k, v]);
            render(); logMsg(`✅ put("${k}", "${v}") → bucket[${bi}]`);
        }
        function hGet() {
            const k = document.getElementById('hKey').value.trim();
            if (!k) return logMsg('⚠️ 请输入 Key');
            const bi = hashFn(k);
            const found = hashTable[bi].find(([key]) => key === k);
            render(); logMsg(found ? `🔍 get("${k}") → "${found[1]}"` : `❌ "${k}" 不存在`);
        }
        function hDel() {
            const k = document.getElementById('hKey').value.trim();
            if (!k) return logMsg('⚠️ 请输入 Key');
            const bi = hashFn(k);
            const len = hashTable[bi].length;
            hashTable[bi] = hashTable[bi].filter(([key]) => key !== k);
            if (hashTable[bi].length === len) return logMsg(`❌ "${k}" 不存在`);
            render(); logMsg(`🗑️ delete("${k}") 成功`);
        }
        function hClear() { hashTable = Array.from({length: BUCKETS}, () => []); render(); logMsg('已清空'); }

        // Initialize with some data
        hashTable[hashFn('name')].push(['name','Alice']);
        hashTable[hashFn('age')].push(['age','25']);
        hashTable[hashFn('city')].push(['city','Beijing']);
        render();
    
    </script>

</body>
