            <section class="algo-section">
                
                <h2>什么是并查集？</h2>
                <div class="intro-content">
                    <p><strong>并查集 (Disjoint Set Union, DSU)</strong> 是一种 <span class="highlight">处理不相交集合的合并与查询</span> 的数据结构。</p>
                    <p>它支持两种操作：</p>
                    <ul>
                        <li><strong>Find(x)</strong>：查找元素 x 属于哪个集合（返回集合代表元）</li>
                        <li><strong>Union(x, y)</strong>：合并 x 和 y 所在的集合</li>
                    </ul>
                    <p>💡 <strong>现实应用</strong>：社交网络中的"共同好友"判断、Kruskal 最小生成树、图像分割、迷宫生成。</p>
                </div>
            
            </section>
            <section class="algo-section">
                
                <h2>🎮 交互演示</h2>
                <div class="controls">
                    <div class="control-group">
                        <button id="union-btn" class="btn btn-primary">Union(随机两元素)</button>
                        <button id="find-btn" class="btn btn-primary">Find(随机元素)</button>
                        <button id="reset-btn" class="btn btn-secondary">重置</button>
                    </div>
                </div>

                <h2>💻 代码实现</h2>
                <pre class="code-block"><code>class UnionFind:
    def __init__(self, n):
        self.parent = list(range(n))
        self.rank = [0] * n  # 按秩合并优化
        self.count = n       # 连通分量数

    def find(self, x):
        # 路径压缩
        if self.parent[x] != x:
            self.parent[x] = self.find(self.parent[x])
        return self.parent[x]

    def union(self, x, y):
        rx, ry = self.find(x), self.find(y)
        if rx == ry: return False
        # 按秩合并：矮树接到高树上
        if self.rank[rx] < self.rank[ry]:
            self.parent[rx] = ry
        elif self.rank[rx] > self.rank[ry]:
            self.parent[ry] = rx
        else:
            self.parent[ry] = rx
            self.rank[rx] += 1
        self.count -= 1
        return True

    def connected(self, x, y):
        return self.find(x) == self.find(y)</code></pre>

                    <tr><td>Union</td><td class="good">O(α(n))</td><td>合并 + 路径压缩</td></tr>

        <script>
        
const svg=d3.select("#uf-viz svg"),W=700,H=280;const N=8;
class UF{constructor(n){this.p=[...Array(n).keys()];this.r=new Array(n).fill(0);this.n=n;}
find(x){if(this.p[x]!==x)this.p[x]=this.find(this.p[x]);return this.p[x];}
union(x,y){let rx=this.find(x),ry=this.find(y);if(rx===ry)return false;
    if(this.r[rx]<this.r[ry])this.p[rx]=ry;else if(this.r[rx]>this.r[ry])this.p[ry]=rx;else{this.p[ry]=rx;this.r[rx]++;}return true;}}
let uf=new UF(N);let msg=document.getElementById("uf-msg");
function render(){svg.selectAll("*").remove();
    const cx=[50,140,230,320,410,500,590,680],y=150;
    // Draw edges (parent links)
    for(let i=0;i<N;i++){const px=uf.find(i);if(px!==i){const pi=N-1-i;svg.append("line").attr("x1",cx[i]).attr("y1",y).attr("x2",cx[px]).attr("y2",y-60).attr("stroke","#999").attr("stroke-width",2).attr("marker-end","url(#arrow)");}}
    // Draw nodes
    for(let i=0;i<N;i++){const g=svg.append("g").attr("transform",`translate(${cx[i]},${i===uf.find(i)?y-60:y})`);
        const isRoot=i===uf.find(i);
        g.append("circle").attr("r",22).attr("fill",isRoot?"#4ade80":"#93c5fd").attr("stroke","#333").attr("stroke-width",2);
        g.append("text").attr("text-anchor","middle").attr("dy","0.35em").attr("font-size","14").attr("font-weight","bold").text(i);
        if(isRoot)g.append("text").attr("text-anchor","middle").attr("y",32).attr("font-size","10").attr("fill","#666").text("root");
    }
    // Arrow marker
    svg.append("defs").append("marker").attr("id","arrow").attr("viewBox","0 0 10 10").attr("refX",20).attr("refY",5).attr("markerWidth",6).attr("markerHeight",6).attr("orient","auto-start-reverse")
        .append("path").attr("d","M 0 0 L 10 5 L 0 10 z").attr("fill","#999");
    // Show rank
    svg.append("text").attr("x",W/2).attr("y",H-20).attr("text-anchor","middle").attr("font-size","12").attr("fill","#666")
        .text(`rank: [${uf.r.join(', ')}]`);
}
document.getElementById("union-btn").addEventListener("click",()=>{let a,b;do{a=Math.floor(Math.random()*N);b=Math.floor(Math.random()*N);}while(a===b);
    const r=uf.union(a,b);msg.textContent=r?`✅ Union(${a}, ${b}) 成功 | 连通分量=${uf.n-uf.r.filter(r=>r>0).length}`:`ℹ️ Union(${a}, ${b}) 已在同一集合`;render();});
document.getElementById("find-btn").addEventListener("click",()=>{const x=Math.floor(Math.random()*N);
    const root=uf.find(x);msg.textContent=`🔍 Find(${x}) = ${root} (集合代表元)`;render();});
document.getElementById("reset-btn").addEventListener("click",()=>{uf=new UF(N);msg.textContent='已重置';render();});
render();

    </script>
