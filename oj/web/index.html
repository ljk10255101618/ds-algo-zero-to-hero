<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS-Algo OJ - 数据结构与算法在线评测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }
        
        .sidebar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .sidebar h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.1em;
        }
        
        .problem-list {
            list-style: none;
        }
        
        .problem-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .problem-item:hover {
            background: #f0f0f0;
        }
        
        .problem-item.active {
            background: #667eea;
            color: white;
        }
        
        .difficulty {
            font-size: 0.75em;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 600;
        }
        
        .difficulty.easy { background: #d1fae5; color: #065f46; }
        .difficulty.medium { background: #fef3c7; color: #92400e; }
        .difficulty.hard { background: #fee2e2; color: #991b1b; }
        
        .problem-item.active .difficulty {
            background: rgba(255,255,255,0.3);
            color: white;
        }
        
        .editor-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .problem-header {
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        
        .problem-header h2 {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 8px;
        }
        
        .problem-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .meta-tag {
            background: #f3f4f6;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #666;
        }
        
        .problem-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        
        .description {
            grid-column: 1 / -1;
        }
        
        .description h4 {
            margin-bottom: 12px;
            color: #333;
        }
        
        .description p {
            line-height: 1.8;
            color: #555;
        }
        
        .examples, .constraints, .code-editor {
            margin-bottom: 20px;
        }
        
        .examples h4, .constraints h4, .code-editor h4 {
            margin-bottom: 12px;
            color: #333;
        }
        
        .example-box {
            background: #f9fafb;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            font-family: 'Monaco', 'Menlo', monospace;
        }
        
        .example-box .label {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .example-box pre {
            margin: 5px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .constraint-list {
            list-style: disc;
            padding-left: 20px;
            color: #555;
            line-height: 1.8;
        }
        
        .code-editor textarea {
            width: 100%;
            min-height: 300px;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
        }
        
        .code-editor textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e5e7eb;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #d1d5db;
        }
        
        .result-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
        
        .result-box.show {
            display: block;
        }
        
        .result-box.passed {
            background: #d1fae5;
            border: 2px solid #10b981;
        }
        
        .result-box.failed {
            background: #fee2e2;
            border: 2px solid #ef4444;
        }
        
        .result-header {
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .result-detail {
            background: white;
            border-radius: 6px;
            padding: 12px;
            margin-top: 10px;
            font-family: monospace;
        }
        
        .hint-box {
            background: #fef3c7;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .hint-box h4 {
            color: #92400e;
            margin-bottom: 8px;
        }
        
        .hint-box p {
            color: #78350f;
            line-height: 1.6;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .problem-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

            <main class="editor-section">

                <div class="problem-content">
                    <div class="description">
                        <h4>📖 题目描述</h4>

                    </div>
                    
                    <div class="examples">
                        <h4>📝 示例</h4>

                    <div class="constraints">

                    <div class="hint-box" id="hintBox" style="display:none;">
                        <h4>💡 提示</h4>
                        <p id="hintText"></p>
                    </div>
                    
                    <div class="code-editor" style="grid-column: 1 / -1;">
                        <h4>💻 代码编辑</h4>
                        <textarea id="codeEditor" placeholder="在这里编写你的 Python 代码..."></textarea>
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="runCode()">▶️ 运行代码</button>
                            <button class="btn btn-secondary" onclick="showSolution()">📖 查看答案</button>
                            <button class="btn btn-secondary" onclick="resetCode()">🔄 重置</button>
                        </div>
                    </div>
                    
                    <div class="result-box" id="resultBox">
                        <div class="result-header" id="resultHeader"></div>
                        <div class="result-detail" id="resultDetail"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script>

        const problems = [

                description: "爬 n 阶楼梯，每次可以爬 1 或 2 阶，有多少种方法？",
                examples: [

                ],

                description: "尽可能满足更多孩子的胃口。",
                examples: [
                    {input: "g = [1,2,3], s = [1,1]", output: "1"}
                ],
                constraints: ["1 <= g.length <= 3 * 10^4"],
                hints: ["优先满足胃口小的孩子"],

    pass`

        let currentProblem = null;
        
        function init() {
            renderProblemList();
            if (problems.length > 0) {
                selectProblem(problems[0].id);
            }
        }
        
        function renderProblemList() {
            const list = document.getElementById('problemList');
            list.innerHTML = problems.map(p => {
                const diffClass = p.difficulty === '简单' ? 'easy' : p.difficulty === '中等' ? 'medium' : 'hard';
                return `<li class="problem-item" data-id="${p.id}" onclick="selectProblem(${p.id})">
                    <span>${p.id} - ${p.title}</span>
                    <span class="difficulty ${diffClass}">${p.difficulty}</span>
                </li>`;
            }).join('');
        }
        
        function selectProblem(id) {
            const p = problems.find(x => x.id === id);
            if (!p) return;
            
            currentProblem = p;
            
            // 更新列表选中状态
            document.querySelectorAll('.problem-item').forEach(item => {
                item.classList.toggle('active', parseInt(item.dataset.id) === id);
            });
            
            // 更新题目信息
            document.getElementById('problemTitle').textContent = `${p.id}. ${p.title}`;
            document.getElementById('problemDifficulty').textContent = p.difficulty;
            document.getElementById('problemTags').textContent = p.tags.join(', ');
            document.getElementById('problemChapter').textContent = p.chapter;
            document.getElementById('problemDesc').textContent = p.description;
            
            // 更新示例
            const examplesHtml = p.examples.map((ex, i) => `
                <div class="example-box">
                    <div class="label">示例 ${i + 1}</div>
                    <pre>输入: ${ex.input}</pre>
                    <pre>输出: ${ex.output}</pre>
                </div>
            `).join('');
            document.getElementById('problemExamples').innerHTML = examplesHtml;
            
            // 更新限制
            document.getElementById('problemConstraints').innerHTML = 
                p.constraints.map(c => `<li>${c}</li>`).join('');
            
            // 更新提示
            const hintBox = document.getElementById('hintBox');
            if (p.hints && p.hints.length > 0) {
                hintBox.style.display = 'block';
                document.getElementById('hintText').textContent = p.hints[0];
            } else {
                hintBox.style.display = 'none';
            }
            
            // 更新代码模板
            document.getElementById('codeEditor').value = p.template;
            
            // 隐藏结果
            document.getElementById('resultBox').classList.remove('show', 'passed', 'failed');
        }
        
        function runCode() {
            if (!currentProblem) {
                alert('请先选择题目');
                return;
            }
            
            const code = document.getElementById('codeEditor').value;
            
            // 简单的客户端模拟测试
            // 实际使用时需要发送到后端或使用 WebAssembly
            const resultBox = document.getElementById('resultBox');
            const resultHeader = document.getElementById('resultHeader');
            const resultDetail = document.getElementById('resultDetail');
            
            resultBox.classList.add('show', 'failed');
            resultHeader.textContent = '⚠️ 本地评测功能需要 Python 环境';
            resultDetail.innerHTML = `
                <p>请使用命令行工具进行评测：</p>
                <pre style="background:#f3f4f6;padding:10px;border-radius:5px;margin-top:10px;">
# 1. 将你的代码保存为 solution.py
# 2. 运行评测脚本
python judge/judge.py ${currentProblem.id} solution.py</pre>
                <p style="margin-top:15px;">或者访问题目对应的学习文档查看详细解法。</p>
            `;
        }
        
        function showSolution() {
            if (!currentProblem) return;
            
            const solutions = {
                1001: `def two_sum(nums: list[int], target: int) -> list[int]:
    seen = {}
    for i, num in enumerate(nums):
        complement = target - num
        if complement in seen:
            return [seen[complement], i]
        seen[num] = i
    return []`,
                2001: `def is_valid(s: str) -> bool:
    stack = []
    mapping = {')': '(', '}': '{', ']': '['}
    for char in s:
        if char in mapping:
            if not stack or stack.pop() != mapping[char]:
                return False
        else:
            stack.append(char)
    return not stack`,
                8001: `def climb_stairs(n: int) -> int:
    if n <= 2:
        return n
    dp = [0] * (n + 1)
    dp[1], dp[2] = 1, 2
    for i in range(3, n + 1):
        dp[i] = dp[i-1] + dp[i-2]
    return dp[n]`
            };
            
            if (solutions[currentProblem.id]) {
                document.getElementById('codeEditor').value = solutions[currentProblem.id];
            } else {
                alert('该题目的解答稍后提供');
            }
        }
        
        function resetCode() {
            if (currentProblem) {
                document.getElementById('codeEditor').value = currentProblem.template;
                document.getElementById('resultBox').classList.remove('show', 'passed', 'failed');
            }
        }
        
        // 初始化
        init();
    </script>

</html>
